<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prijem Robe</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="icons/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007aff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-box">
      <div class="login-logo">
        <img src="icons/logo.svg" alt="PR" style="width:72px;height:72px;border-radius:20px;">
        <h1>Prijem Robe</h1>
        <p>Sustav za prijem i kontrolu robe</p>
      </div>
      <div class="login-card">
        <div class="form-group">
          <label>Poslovnica</label>
          <select id="sel" disabled><option value="">Ucitavanje...</option></select>
        </div>
        <div class="form-group">
          <label>PIN</label>
          <div class="pin-input-group">
            <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" autocomplete="off">
            <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" autocomplete="off">
            <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" autocomplete="off">
            <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" autocomplete="off">
          </div>
        </div>
        <div id="err" class="error-msg" style="display:none"></div>
        <button id="login-btn" class="btn btn-primary btn-full" disabled>Prijava</button>
        <div class="token-section">
          <details id="token-det">
            <summary>&#9881; GitHub Token</summary>
            <div class="token-input-wrap">
              <div class="form-group" style="margin-bottom:8px">
                <input type="password" id="gh-token" placeholder="Unesi GitHub token" autocomplete="off">
              </div>
              <button id="save-token" class="btn btn-secondary btn-sm btn-full">Spremi token</button>
              <div id="token-status" class="token-status"></div>
            </div>
          </details>
        </div>
      </div>
    </div>
  </div>
  <script src="js/github.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if ("serviceWorker" in navigator) { navigator.serviceWorker.register("sw.js").catch(function(){}); }
    var pins = document.querySelectorAll(".pin-digit");
    var loginBtn = document.getElementById("login-btn");
    var sel = document.getElementById("sel");
    var err = document.getElementById("err");
    var tokenDet = document.getElementById("token-det");
    var tokenSt = document.getElementById("token-status");

    for (var idx = 0; idx < pins.length; idx++) {
      (function(i) {
        pins[i].addEventListener("input", function() { if (pins[i].value && i < 3) pins[i+1].focus(); pins[i].classList.toggle("filled", !!pins[i].value); chk(); });
        pins[i].addEventListener("keydown", function(e) { if (e.key === "Backspace" && !pins[i].value && i > 0) { pins[i-1].focus(); pins[i-1].value = ""; pins[i-1].classList.remove("filled"); } });
        pins[i].addEventListener("paste", function(e) { e.preventDefault(); var p = (e.clipboardData||window.clipboardData).getData("text").trim(); if (/^\d{4}$/.test(p)) { for (var j=0;j<4;j++){pins[j].value=p[j];pins[j].classList.add("filled");} pins[3].focus(); chk(); } });
      })(idx);
    }

    function getPin() { var p = ""; for (var i=0;i<pins.length;i++) p += pins[i].value; return p; }
    function chk() { loginBtn.disabled = getPin().length !== 4 || !sel.value; }
    sel.addEventListener("change", chk);

    function updateUI() {
      if (GitHubStorage.isConfigured()) {
        var c = GitHubStorage.getConfig();
        tokenSt.className = "token-status connected";
        tokenSt.innerHTML = '<span class="status-dot green"></span> Povezano: ' + c.owner + "/" + c.repo;
        document.getElementById("gh-token").value = "\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022";
        tokenDet.removeAttribute("open");
        loadPoslovnice();
      } else {
        tokenSt.className = "token-status disconnected";
        tokenSt.innerHTML = '<span class="status-dot red"></span> Token nije postavljen';
        tokenDet.setAttribute("open", "");
        sel.innerHTML = '<option value="">Prvo postavi token</option>';
      }
    }

    document.getElementById("save-token").addEventListener("click", function() {
      var token = document.getElementById("gh-token").value.trim();
      if (!token || token === "\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022") { showErr("Unesi token"); return; }
      var btn = document.getElementById("save-token");
      btn.textContent = "Povezujem..."; btn.disabled = true;
      GitHubStorage.saveToken(token).then(function() {
        return GitHubStorage.ensureDataStructure();
      }).then(function() {
        updateUI();
      }).catch(function() {
        GitHubStorage.clearConfig();
        showErr("Neispravan token ili nema pristupa.");
      }).then(function() { btn.textContent = "Spremi token"; btn.disabled = false; });
    });

    function loadPoslovnice() {
      if (!GitHubStorage.isConfigured()) return;
      GitHubStorage.readFile("data/poslovnice.json").then(function(data) {
        if (data && data.content && data.content.poslovnice) {
          sel.innerHTML = '<option value="">-- Odaberi poslovnicu --</option>';
          for (var i = 0; i < data.content.poslovnice.length; i++) {
            var p = data.content.poslovnice[i];
            sel.innerHTML += '<option value="' + p.id + '">' + p.naziv + "</option>";
          }
          sel.disabled = false;
        }
      }).catch(function() { sel.innerHTML = '<option value="">Greska</option>'; });
    }

    loginBtn.addEventListener("click", doLogin);
    pins[3].addEventListener("keydown", function(e) { if (e.key === "Enter" && !loginBtn.disabled) doLogin(); });

    function doLogin() {
      loginBtn.textContent = "Prijava..."; loginBtn.disabled = true; hideErr();
      Auth.login(sel.value, getPin()).then(function() {
        window.location.href = "dashboard.html";
      }).catch(function(e) {
        showErr(e.message);
        for (var i=0;i<pins.length;i++){pins[i].value="";pins[i].classList.remove("filled");}
        pins[0].focus();
        loginBtn.textContent = "Prijava"; loginBtn.disabled = false;
      });
    }

    function showErr(m) { err.textContent = m; err.style.display = "block"; }
    function hideErr() { err.style.display = "none"; }

    if (Auth.isLoggedIn()) window.location.href = "dashboard.html";
    else updateUI();
  </script>
</body>
</html>
