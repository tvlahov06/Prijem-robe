<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prijem Robe</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="icons/favicon.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007aff">
  <style>
    @media(max-width:500px){
      .page-header{flex-wrap:wrap;gap:8px}
      .page-header .title-group h1{font-size:18px}
      .page-header .header-action{width:100%;display:flex;gap:6px}
      .stat-card{padding:10px 6px}.stat-card .value{font-size:20px}
      .prijem-card{padding:12px 14px;flex-wrap:wrap;gap:8px}
      .prijem-card .prijem-meta{font-size:12px}
    }
  </style>
</head>
<body>
  <script>if(localStorage.getItem("theme")==="dark")document.documentElement.setAttribute("data-theme","dark");</script>
  <div class="app">
    <div class="page-header">
      <div class="title-group">
        <h1>&#128230; Prijemi robe</h1>
        <div class="poslovnica-name" id="pn"></div>
      </div>
      <div class="header-action" style="display:flex;gap:8px;align-items:center">
        <div class="theme-toggle" id="theme-toggle" title="Tamni/svijetli nacin"></div>
        <button id="new-btn" class="btn btn-primary btn-sm">+ Novi prijem</button>
        <button onclick="Auth.logout()" class="btn-icon" title="Odjava">&#9211;</button>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-card" style="border-left:4px solid #007aff"><div class="value" id="st">-</div><div class="label">Ukupno</div></div>
      <div class="stat-card" style="border-left:4px solid #ff9500"><div class="value" id="sa">-</div><div class="label">Aktivnih</div></div>
      <div class="stat-card" style="border-left:4px solid #34c759"><div class="value" id="sd">-</div><div class="label">Zavrsenih</div></div>
    </div>
    <div id="list" class="prijem-list"><div class="empty-state loading"><div class="empty-icon">&#9203;</div><h3>Ucitavanje...</h3></div></div>
  </div>
  <script src="js/github.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (!Auth.requireAuth()) throw 0;
    document.getElementById("pn").textContent = Auth.getPoslovnica();
    document.getElementById("new-btn").addEventListener("click", function() { window.location.href = "priprema.html"; });
    var list = document.getElementById("list");

    function load() {
      var pid = Auth.getPoslovnicaId();
      GitHubStorage.listFiles("data/prijemi/" + pid).then(function(files) {
        var validFiles = [];
        for (var i = 0; i < (files||[]).length; i++) {
          if (files[i].name.indexOf(".json") > -1 && files[i].name.indexOf(".") !== 0) validFiles.push(files[i]);
        }
        var prijemi = [];
        var chain = Promise.resolve();
        for (var i = 0; i < validFiles.length; i++) {
          (function(f) {
            chain = chain.then(function() {
              return GitHubStorage.readFile(f.path).then(function(d) {
                if (d) { d.content._sha = d.sha; d.content._path = f.path; prijemi.push(d.content); }
              }).catch(function(){});
            });
          })(validFiles[i]);
        }
        return chain.then(function() {
          prijemi.sort(function(a, b) { return new Date(b.datum) - new Date(a.datum); });
          document.getElementById("st").textContent = prijemi.length;
          var active = 0, done = 0;
          for (var i = 0; i < prijemi.length; i++) { if (prijemi[i].status === "zavrsen") done++; else active++; }
          document.getElementById("sa").textContent = active;
          document.getElementById("sd").textContent = done;

          if (!prijemi.length) { list.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128203;</div><h3>Nema prijema</h3><p>Klikni "+ Novi prijem" za pocetak.</p></div>'; return; }
          list.innerHTML = "";
          for (var i = 0; i < prijemi.length; i++) {
            (function(p) {
              var totO = 0, totS = 0, totA = 0;
              for (var d = 0; d < p.dokumenti.length; d++) {
                totA += p.dokumenti[d].stavke.length;
                for (var s = 0; s < p.dokumenti[d].stavke.length; s++) { totO += p.dokumenti[d].stavke[s].ocekivano; totS += (p.dokumenti[d].stavke[s].skenirano || 0); }
              }
              var date = new Date(p.datum).toLocaleDateString("hr-HR", { day:"numeric", month:"short", year:"numeric" });
              var card = document.createElement("div");
              card.className = "prijem-card"; card.style.cursor = "pointer";
              var statusText = p.status === "priprema" ? "Priprema" : p.status === "aktivan" ? "Aktivan" : "Zavrsen";
              card.innerHTML = '<div class="prijem-info" style="flex:1"><div class="prijem-date">' + date + '</div><div class="prijem-meta">' + p.dokumenti.length + " dok. &middot; " + totA + " artikala &middot; " + totS + "/" + totO + ' sken.</div></div><span class="status-badge ' + p.status + '">' + statusText + '</span><button class="btn-icon delete-btn" title="Obrisi" style="margin-left:8px;width:32px;height:32px;font-size:14px;color:var(--danger);border-color:var(--danger-border)">&#10005;</button>';
              card.addEventListener("click", function(e) {
                if (e.target.closest(".delete-btn")) return;
                window.location.href = "skeniranje.html?id=" + p.id;
              });
              card.querySelector(".delete-btn").addEventListener("click", function(e) {
                e.stopPropagation();
                if (!confirm("Obrisati prijem od " + date + "?")) return;
                GitHubStorage.deleteFile(p._path, p._sha, "Brisanje").then(function() { toast("Obrisano", "success"); load(); }).catch(function(err) { toast("Greska: " + err.message, "error"); });
              });
              list.appendChild(card);
            })(prijemi[i]);
          }
        });
      }).catch(function(e) { list.innerHTML = '<div class="empty-state"><div class="empty-icon">&#9888;</div><h3>Greska</h3><p>' + e.message + "</p></div>"; });
    }

    function toast(m, t) { var old = document.querySelectorAll(".toast"); for(var i=0;i<old.length;i++) old[i].remove(); var el = document.createElement("div"); el.className = "toast " + t; el.textContent = m; document.body.appendChild(el); setTimeout(function() { el.remove(); }, 3000); }

    // Dark mode toggle
    var toggle = document.getElementById("theme-toggle");
    if (localStorage.getItem("theme") === "dark") { document.documentElement.setAttribute("data-theme", "dark"); toggle.classList.add("dark"); }
    toggle.addEventListener("click", function() {
      var isDark = document.documentElement.getAttribute("data-theme") === "dark";
      if (isDark) { document.documentElement.removeAttribute("data-theme"); toggle.classList.remove("dark"); localStorage.setItem("theme", "light"); }
      else { document.documentElement.setAttribute("data-theme", "dark"); toggle.classList.add("dark"); localStorage.setItem("theme", "dark"); }
    });

    load();
  </script>
</body>
</html>
