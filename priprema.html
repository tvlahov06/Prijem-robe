<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Prijem Robe - Priprema</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="icons/favicon.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007aff">
  <style>
    @media(max-width:500px){
      .page-header{flex-wrap:wrap;gap:8px}
      .page-header .title-group h1{font-size:18px}
      .upload-zone{padding:32px 16px}
      .article-item{padding:10px 12px;gap:8px}
      .article-info .name{font-size:12px}
      #is div[style*="flex"]{flex-direction:column}
      #mn,#mb,#mq{min-width:0!important;flex:unset!important;width:100%!important}
      #ma{width:100%}
    }
  </style>
</head>
<body>
  <script>if(localStorage.getItem("theme")==="dark")document.documentElement.setAttribute("data-theme","dark");</script>
  <div class="app">
    <div class="page-header">
      <button class="back-btn" onclick="window.location.href='dashboard.html'">&#8592;</button>
      <div class="title-group"><h1>Priprema prijema</h1><p id="pn"></p></div>
      <div class="header-action" style="display:flex;gap:6px;align-items:center">
        <div class="theme-toggle" id="theme-toggle" onclick="var d=document.documentElement.getAttribute('data-theme')==='dark';if(d){document.documentElement.removeAttribute('data-theme');this.classList.remove('dark');localStorage.setItem('theme','light')}else{document.documentElement.setAttribute('data-theme','dark');this.classList.add('dark');localStorage.setItem('theme','dark')}"></div>
        <button id="save-btn" class="btn btn-success btn-sm" disabled>&#128190; Spremi</button>
      </div>
    </div>
    <div id="upload-zone" class="upload-zone">
      <div class="upload-icon">&#128196;</div><h3>Ucitaj PDF dostavnice</h3><p>Povuci datoteke ovdje ili klikni za odabir</p>
      <input type="file" id="fi" accept=".pdf" multiple style="display:none">
    </div>
    <div id="fl" style="margin:16px 0;display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:13px;color:var(--text-secondary);font-weight:500">Ucitani dokumenti:</span>
        <button id="add-more" class="btn btn-secondary btn-sm">+ Dodaj PDF</button>
      </div>
      <div id="ft" style="display:flex;flex-wrap:wrap;gap:6px"></div>
    </div>
    <div id="pl" style="display:none;text-align:center;padding:40px"><div style="font-size:32px" class="loading">&#9881;</div><p style="color:var(--text-secondary);margin-top:8px">Citam PDF-ove...</p></div>
    <div id="is" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-size:14px;color:var(--text-secondary)">Ukupno: <strong id="ti" style="color:var(--text)">0</strong> artikala, <strong id="tq" style="color:var(--text)">0</strong> komada</span>
      </div>
      <div class="article-list-section"><div class="article-list-header">Artikli</div><div id="il"></div></div>
      <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
        <input type="text" id="mn" placeholder="Naziv artikla" style="flex:2;min-width:140px;padding:10px 12px;background:var(--bg-white);border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:var(--font);color:var(--text);outline:none">
        <input type="text" id="mb" placeholder="Barkod" style="flex:1;min-width:110px;padding:10px 12px;background:var(--bg-white);border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:var(--font);color:var(--text);outline:none">
        <input type="text" inputmode="numeric" id="mq" placeholder="Kol." value="1" style="width:60px;padding:10px 8px;background:var(--bg-white);border:1.5px solid var(--border);border-radius:10px;font-size:14px;text-align:center;font-family:var(--font);color:var(--text);outline:none">
        <button id="ma" class="btn btn-secondary btn-sm">+ Dodaj</button>
      </div>
    </div>
  </div>
  <script src="js/github.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/pdfParser.js"></script>
  <script>
    if (!Auth.requireAuth()) throw 0;
    document.getElementById("pn").textContent = Auth.getPoslovnica();
    var uz = document.getElementById("upload-zone"), fi = document.getElementById("fi"), fl = document.getElementById("fl"), ft = document.getElementById("ft"), il = document.getElementById("il"), saveBtn = document.getElementById("save-btn");
    var docs = [], exId = null, exSha = null;
    var editId = new URLSearchParams(window.location.search).get("id");

    uz.addEventListener("click", function() { fi.click(); });
    document.getElementById("add-more").addEventListener("click", function() { fi.click(); });
    uz.addEventListener("dragover", function(e) { e.preventDefault(); uz.classList.add("dragover"); });
    uz.addEventListener("dragleave", function() { uz.classList.remove("dragover"); });
    uz.addEventListener("drop", function(e) { e.preventDefault(); uz.classList.remove("dragover"); var files = []; for (var i=0;i<e.dataTransfer.files.length;i++) { if (e.dataTransfer.files[i].type === "application/pdf") files.push(e.dataTransfer.files[i]); } proc(files); });
    fi.addEventListener("change", function() { var files = []; for (var i=0;i<fi.files.length;i++) files.push(fi.files[i]); proc(files); fi.value = ""; });

    function proc(files) {
      if (!files.length) return;
      document.getElementById("pl").style.display = "block";
      PDFParser.parseMultiple(files).then(function(results) {
        for (var i = 0; i < results.length; i++) { docs.push(results[i]); }
        rebuildTags();
        fl.style.display = "block";
        render();
      }).catch(function(e) { toast("Greska: " + e.message, "error"); }).then(function() {
        document.getElementById("pl").style.display = "none";
      });
    }

    function rebuildTags() {
      ft.innerHTML = "";
      for (var i = 0; i < docs.length; i++) {
        (function(di) {
          var tag = document.createElement("span");
          tag.className = "file-tag";
          tag.innerHTML = '&#128196; ' + docs[di].dokumentNaziv + ' <span class="count">(' + docs[di].stavke.length + ')</span> <button onclick="rmDoc(' + di + ')" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;margin-left:4px" title="Obrisi dokument">&#10005;</button>';
          ft.appendChild(tag);
        })(i);
      }
    }

    window.rmDoc = function(di) {
      if (!confirm("Obrisati dokument " + docs[di].dokumentNaziv + "?")) return;
      docs.splice(di, 1);
      rebuildTags();
      render();
      if (docs.length === 0) fl.style.display = "none";
    };

    function render() {
      il.innerHTML = ""; var tot = 0, tq = 0;
      for (var di = 0; di < docs.length; di++) {
        var sep = document.createElement("div"); sep.className = "doc-separator";
        sep.innerHTML = '&#128196; ' + docs[di].dokumentNaziv + ' <button onclick="rmDoc(' + di + ')" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:12px;margin-left:auto" title="Obrisi dokument">&#10005; Obrisi</button>';
        sep.style.display = "flex"; sep.style.alignItems = "center";
        il.appendChild(sep);
        for (var si = 0; si < docs[di].stavke.length; si++) {
          (function(dIdx, sIdx) {
            tot++; tq += docs[dIdx].stavke[sIdx].ocekivano;
            var s = docs[dIdx].stavke[sIdx];
            var el = document.createElement("div"); el.className = "article-item";
            el.innerHTML = '<div class="article-icon status-none">&#128230;</div><div class="article-info"><div class="name">' + s.naziv + '</div><div class="barcode">' + s.barkod + '</div></div><div class="article-count"><span style="font-weight:700">' + s.ocekivano + '</span> <span style="color:var(--text-muted)">kom</span></div><button class="btn-icon" onclick="rmItem(' + dIdx + ',' + sIdx + ')" style="width:28px;height:28px;font-size:12px;color:var(--danger);border-color:var(--danger-border)">&#10005;</button>';
            il.appendChild(el);
          })(di, si);
        }
      }
      document.getElementById("ti").textContent = tot; document.getElementById("tq").textContent = tq;
      document.getElementById("is").style.display = tot > 0 ? "block" : "none";
      saveBtn.disabled = tot === 0;
    }

    window.rmItem = function(di, si) { docs[di].stavke.splice(si, 1); if (!docs[di].stavke.length) { docs.splice(di, 1); } rebuildTags(); render(); if (!docs.length) fl.style.display = "none"; };

    document.getElementById("ma").addEventListener("click", function() {
      var n = document.getElementById("mn").value.trim(), b = document.getElementById("mb").value.trim(), q = parseInt(document.getElementById("mq").value) || 1;
      if (!n || !b) { toast("Unesi naziv i barkod", "error"); return; }
      var m = null;
      for (var i = 0; i < docs.length; i++) { if (docs[i].dokumentNaziv === "Rucni unos") { m = docs[i]; break; } }
      if (!m) { m = { dokumentNaziv: "Rucni unos", stavke: [] }; docs.push(m); }
      m.stavke.push({ naziv: n, barkod: b, ocekivano: q, skenirano: 0 });
      document.getElementById("mn").value = ""; document.getElementById("mb").value = ""; document.getElementById("mq").value = "1";
      rebuildTags(); fl.style.display = "block"; render();
    });

    saveBtn.addEventListener("click", function() {
      if (!docs.length) return;
      saveBtn.disabled = true; saveBtn.textContent = "Spremam...";
      var pid = Auth.getPoslovnicaId(), now = new Date(), id = exId || ("prijem-" + now.getTime());
      var data = { id: id, poslovnica: pid, datum: now.toISOString().split("T")[0], status: "aktivan", kreirano: now.toISOString(), azurirano: now.toISOString(), dokumenti: [] };
      for (var i = 0; i < docs.length; i++) {
        var stavke = [];
        for (var j = 0; j < docs[i].stavke.length; j++) {
          var s = docs[i].stavke[j];
          stavke.push({ naziv: s.naziv, barkod: s.barkod, ocekivano: s.ocekivano, skenirano: s.skenirano || 0 });
        }
        data.dokumenti.push({ naziv: docs[i].dokumentNaziv, stavke: stavke });
      }
      GitHubStorage.writeFile("data/prijemi/" + pid + "/" + id + ".json", data, "Prijem " + data.datum, exSha).then(function() {
        toast("Spremljeno!", "success"); setTimeout(function() { window.location.href = "dashboard.html"; }, 800);
      }).catch(function(e) { toast("Greska: " + e.message, "error"); saveBtn.disabled = false; saveBtn.textContent = "\u{1F4BE} Spremi"; });
    });

    function loadEx() {
      if (!editId) return;
      GitHubStorage.readFile("data/prijemi/" + Auth.getPoslovnicaId() + "/" + editId + ".json").then(function(d) {
        if (d) {
          exId = d.content.id; exSha = d.sha;
          for (var i = 0; i < d.content.dokumenti.length; i++) {
            docs.push({ dokumentNaziv: d.content.dokumenti[i].naziv, stavke: d.content.dokumenti[i].stavke });
          }
          rebuildTags(); fl.style.display = "block"; render();
        }
      }).catch(function(){});
    }

    function toast(m, t) { var old = document.querySelectorAll(".toast"); for(var i=0;i<old.length;i++) old[i].remove(); var el = document.createElement("div"); el.className = "toast " + t; el.textContent = m; document.body.appendChild(el); setTimeout(function() { el.remove(); }, 3000); }
    if(localStorage.getItem("theme")==="dark") document.getElementById("theme-toggle").classList.add("dark");
    loadEx();
  </script>
</body>
</html>
